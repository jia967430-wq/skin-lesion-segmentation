# Training Configuration for ISIC 2018 Skin Lesion Segmentation

# Data configuration
data:
  root_dir: "D:/medseg-data/ISIC2018"
  image_size: [224, 224]
  in_channels: 3
  out_channels: 1
  val_split: 0.2  # 20% for validation
  augmentation: true

# Model configuration
model:
  name: "attention_unet"  # Options: unet, attention_unet, attention_unet_lite
  base_filters: 64

training:
  batch_size: 4
  epochs: 60
  learning_rate: 0.0005
  weight_decay: 0.0001
  min_lr: 1e-6
  optimizer: "AdamW"
  scheduler: "CosineAnnealingWarmRestarts"
  scheduler_T0: 10
  scheduler_T_mult: 1
  early_stopping_patience: 15
  gradient_clip: 1.0
  num_workers: 2
  label_smoothing: 0.1

# Loss configuration
loss:
  name: "HybridDiceBCELoss"
  dice_weight: 0.5
  bce_weight: 0.5

augmentation:
  rotation: 15
  flip: true
  zoom: [0.8, 1.2]
  brightness: 0.1
  contrast: 0.1

# Logging and checkpointing
logging:
  log_dir: "logs"
  checkpoint_dir: "checkpoints"
  save_interval: 5

seed: 42
